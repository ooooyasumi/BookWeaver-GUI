appId: com.bookweaver.app
productName: BookWeaver
directories:
  output: release

mac:
  target: dmg
  category: public.app-category.productivity
  icon: resources/icon.icns

win:
  target: portable
  icon: resources/icon.png

extraResources:
  - from: "dist-backend"
    to: "backend"
    filter: ["**/*"]

files:
  - "dist/**/*"
  - "dist-electron/**/*"
  - "package.json"
